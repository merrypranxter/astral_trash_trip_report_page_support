<!doctype html>
<html lang="en" data-weirdness="feral">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#120019" />
    <title>The Shipwrekt Experience — component preview</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      #title-organism,
      .title-contact,
      .state-readout,
      .interaction-hint,
      .static-title {
        opacity: 0 !important;
        pointer-events: none !important;
      }

      .shipwrekt-demo-stage {
        position: fixed;
        z-index: 12;
        display: grid;
        inset: 0;
        place-items: center;
        padding: clamp(1rem, 4vw, 4rem);
      }

      .shipwrekt-demo-stage shipwrekt-title {
        width: min(82vw, 52rem);
      }

      .demo-note {
        position: fixed;
        z-index: 14;
        right: clamp(1rem, 3vw, 3rem);
        bottom: clamp(1rem, 3vw, 3rem);
        margin: 0;
        color: #c9ff2f;
        font: 700 clamp(.62rem, .5rem + .25vw, .78rem) / 1.3 ui-monospace, monospace;
        letter-spacing: .18em;
        text-transform: uppercase;
        text-shadow: 0 0 .8rem #100015, 0 0 1rem currentColor;
      }
    </style>
  </head>
  <body>
    <canvas id="trip-field" aria-hidden="true"></canvas>
    <canvas id="title-organism" aria-hidden="true"></canvas>

    <main class="threshold" aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">The Shipwrekt Experience component preview</h1>
      <p class="archive-mark" aria-hidden="true">
        <span>ASTRAL TRASH</span>
        <span>PERSONAL PSYCHEDELIC ARCHIVE</span>
      </p>
      <button class="title-contact" type="button" aria-label="Hidden Trip Reports title"></button>
      <p id="interaction-hint" class="interaction-hint">disturb</p>
      <p class="state-readout" aria-live="polite">STATE 01</p>
    </main>

    <div class="static-title" aria-hidden="true"><span>TRIP</span><span>REPORTS</span></div>

    <section class="shipwrekt-demo-stage" aria-label="Shipwrekt title sprite preview">
      <shipwrekt-title></shipwrekt-title>
    </section>
    <p class="demo-note">hover / disturb / click</p>

    <script defer src="./trip-reports.js"></script>
    <script defer src="./components/shipwrekt-title/shipwrekt-title.js"></script>
  </body>
</html>
