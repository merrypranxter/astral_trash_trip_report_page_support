<!doctype html>
<html lang="en" data-weirdness="feral">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#120019" />
    <meta
      name="description"
      content="Trip Reports — an interactive code-art threshold into the Astral Trash psychedelic archive."
    />
    <title>Trip Reports — Astral Trash</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="trip-field" aria-hidden="true"></canvas>
    <canvas id="title-organism" aria-hidden="true"></canvas>

    <main class="threshold" aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">Trip Reports</h1>

      <p class="archive-mark" aria-hidden="true">
        <span>ASTRAL TRASH</span>
        <span>PERSONAL PSYCHEDELIC ARCHIVE</span>
      </p>

      <button
        class="title-contact"
        type="button"
        aria-label="Disturb the Trip Reports title organism"
        aria-describedby="interaction-hint"
      >
        <span class="sr-only">Activate the hyperdimensional relic state</span>
      </button>

      <p id="interaction-hint" class="interaction-hint">
        <span class="hint-glyph" aria-hidden="true">⌁</span>
        approach / disturb / click
      </p>

      <p class="state-readout" aria-live="polite" aria-atomic="true">
        STATE 01 / CHROMATIC THOUGHT ANIMAL
      </p>
    </main>

    <div class="static-title" aria-hidden="true">
      <span>TRIP</span>
      <span>REPORTS</span>
    </div>

    <script defer src="./trip-reports.js"></script>
  </body>
</html>
